<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="my title"></title>
    <link rel="stylesheet" href="Desire hospital.css">
</head>

<body>
    <h1 id="Register" align="center">Register</h1>
    <p id="register form">Register Here:</p>
    <form action="Desire hospital.php" method="get">
        <svg align="center" xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24">
            <path fill="currentColor"
                d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8zm1-13h-2v5H7v2h4v5h2v-5h4v-2h-4V7z" />
        </svg>
        <fieldset>
            <label for="patient Name">Name:</label>
            <input type="text" value="name" placeholder="Name of the patient" maxlength="18" minlength="6"
                id="patient name" required><br><br>
            <label for="location">location:</label>
            <input type="location" placeholder="location" id="location" maxlength="18" minlength="6" required><br><br>

            <label for="email">Email:</label>
            <input type="text" placeholder="johndoe@gmail.com" maxlength="18" minlength="6" required><br><br>

            <label for="phone">phone number#:</label>
            <input type="tel" id="phone" placeholder="+234-172-15278" pattern="{0-9}{3}-{0-9}{3}-{0-9}{4}"
                maxlength="18" minlength="6" required><br><br>

            <label for="bdate">birthday</label>
            <input type="date" id="bday" required><br><br>

            <label for="quantity">quantity</label>
            <input type="number" id="quantity" min="0" max="100" value="1"><br><br>

            <label for="title">mr</label>
            <input type="radio" id="mr" value="mr" name="title" required>
            <label for="title">mrs</label>
            <input type="radio" id="mrs" value="mrs" name="title" required>
            <label for="title">Phd.</label>
            <input type="radio" id="phd" value="phd" name="title" required>
            <label for="payment">payment</label>
            <select id="payment">
                <option value="visa">visa</option>
                <option value="mastercard">mastercard</option>
                <option value="fluterwave">fluterwave</option>
            </select><br>
            <label for="payment">payment</label>



            <input type="submit" id="my submit" <a href="work.html"><br><br>
            <input type="reset">



        </fieldset>

    </form>

</body>

</html>
